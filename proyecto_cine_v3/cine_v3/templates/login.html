<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ brand_name }} – Iniciar sesión</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .auth-sub { color: var(--pearl-dim); font-size:.9rem; margin-bottom:28px; margin-top:-12px; }
    .auth-link { margin-top:20px; font-size:.85rem; color:var(--pearl-dim); text-align:center; }
    .auth-link a { color:var(--gold); text-decoration:none; font-weight:600; }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--pearl-dim); font-size:.8rem; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    #msg-login { display:none; padding:10px 14px; border-radius:var(--radius-sm); background:rgba(192,57,43,0.15); border:1px solid var(--crimson); color:var(--crimson-bright); font-size:.875rem; margin-bottom:12px; }
    .auth-card-wrap { position:relative; overflow:hidden; }
    .auth-card-wrap::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-dim)); }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">{{ brand_name }}</div>
    <nav>
      <a href="/">Cartelera</a>
      <a href="/registro-usuario" class="btn-nav">Crear cuenta</a>
    </nav>
  </div>
</header>
<main style="display:flex;justify-content:center;padding:80px 16px">
  <div class="auth-card-wrap" style="background:var(--panel);border-radius:var(--radius-lg);padding:40px 36px;max-width:420px;width:100%;border:1px solid var(--border-2);box-shadow:var(--shadow)">
    <h2 style="font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--pearl);margin-bottom:6px">Bienvenido</h2>
    <p class="auth-sub">Accede para ver tu historial y comprar entradas</p>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <p id="msg-login"></p>
    <button class="btn-primary" id="btn-login" onclick="doLogin()" style="width:100%;justify-content:center">Iniciar sesión</button>
    <div class="auth-divider">o</div>
    <p class="auth-link">¿No tienes cuenta? <a href="/registro-usuario">Regístrate gratis</a></p>
  </div>
</main>
<script>
async function doLogin() {
  const btn=document.getElementById('btn-login'), msg=document.getElementById('msg-login');
  msg.style.display='none'; btn.disabled=true; btn.textContent='Entrando...';
  const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
  const data=await res.json();
  if(res.ok){window.location.href='/';}
  else{msg.textContent=data.error;msg.style.display='block';btn.disabled=false;btn.textContent='Iniciar sesión';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
