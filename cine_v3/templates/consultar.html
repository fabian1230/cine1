<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ brand_name }} – Validar Tiquete</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .validar-wrap { display:flex; justify-content:center; padding:80px 16px; }
    .validar-box { background:var(--panel); border-radius:var(--radius-lg); padding:44px 40px; max-width:500px; width:100%; border:1px solid var(--border-2); box-shadow:var(--shadow); text-align:center; position:relative; overflow:hidden; }
    .validar-box::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-dim)); }
    .validar-icon { width:64px; height:64px; background:rgba(212,168,67,0.1); border:1px solid var(--border-2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin:0 auto 20px; }
    .validar-title { font-family:'Playfair Display',serif; font-size:1.7rem; color:var(--pearl); margin-bottom:6px; }
    .validar-sub { color:var(--pearl-dim); font-size:.875rem; margin-bottom:28px; }
    .input-code { background:var(--panel-2) !important; border:1px solid var(--border-2) !important; font-family:'DM Mono',monospace !important; font-size:1.1rem !important; letter-spacing:.15em !important; text-transform:uppercase !important; text-align:center !important; padding:14px !important; }
    .input-code:focus { border-color:var(--gold) !important; outline:none; }
    #resultado-validacion { min-height:20px; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">{{ brand_name }}</div>
    <nav><a href="/"> Cartelera</a></nav>
  </div>
</header>
<main class="validar-wrap">
  <div class="validar-box">
    <div class="validar-icon">🎫</div>
    <h2 class="validar-title">Validar Tiquete</h2>
    <p class="validar-sub">Ingresa el código del tiquete para verificar su autenticidad</p>
    <form id="form-validar" onsubmit="return false">
      <input type="text" name="codigo" class="input-code" style="width:100%;margin-bottom:16px" placeholder="ABC123DEF456" maxlength="12" autocomplete="off" />
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center">Verificar tiquete</button>
    </form>
    <div id="resultado-validacion" style="margin-top:16px"></div>
  </div>
</main>
<script src="/static/js/script.js"></script>
</body>
</html>
